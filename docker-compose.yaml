services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - logNet

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_INSTALL_PLUGINS=redis-datasource
      # - GF_SERVER_ROOT_URL=http://localhost:8080/grafana
      # - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - 3000:3000
    volumes:
      - ./infra/grafana.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - logNet
      - webNet

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - logNet

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: dragonfly
    restart: unless-stopped
    command: >
      dragonfly
      --dir /data
      --requirepass ${CACHE_PASSWORD}
      --cache_mode
      --dbfilename dump
      --snapshot_cron "*/15 * * * *"
      --proactor_threads=1
    ulimits:
      memlock: -1
    volumes:
      - dragonfly_data:/data
    networks:
      - cacheNet
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CACHE_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  listen:
    build:
      context: .
      dockerfile: apps/listen/Dockerfile
    container_name: listen
    restart: unless-stopped
    depends_on:
      dragonfly:
        condition: service_healthy
    networks:
      - cacheNet
      - logNet
  
  curvert1:
    build:
      context: .
      dockerfile: apps/curvert/Dockerfile
    container_name: curvert1
    restart: unless-stopped
    depends_on:
      dragonfly:
        condition: service_healthy
    networks:
      - cacheNet
      - logNet
      - webNet
  
  curvert2:
    build:
      context: .
      dockerfile: apps/curvert/Dockerfile
    container_name: curvert2
    restart: unless-stopped
    depends_on:
      dragonfly:
        condition: service_healthy
    networks:
      - cacheNet
      - logNet
      - webNet

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - webNet


networks:
  cacheNet:
    name: cacheNet
  logNet:
    name: logNet
  webNet:
    name: webNet


volumes:
  dragonfly_data:
  grafana-data:
  loki-data:
